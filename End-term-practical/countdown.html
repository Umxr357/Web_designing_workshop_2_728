<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown Timer</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 60px; }
  input { padding: 8px; font-size: 16px; width: 100px; text-align: center; }
  button { padding: 8px 16px; font-size: 16px; margin-left: 10px; }
  #result { font-size: 50px; margin-top: 30px; color: #d63031; font-weight: bold; }
</style>
</head>
<body>

  <h2>Countdown Timer</h2>
  <input type="number" id="num" placeholder="Enter a number">
  <button onclick="startCountdown()">Start</button>

  <div id="result"></div>

<script>
function startCountdown() {
  let n = parseInt(document.getElementById("num").value);
  const resultDiv = document.getElementById("result");

  if (isNaN(n) || n < 1) {
    resultDiv.innerHTML = "Please enter a valid number!";
    return;
  }

  let i = n;
  const timer = setInterval(function() {
    resultDiv.innerHTML = i;
    i--;
    if (i < 1) {
      clearInterval(timer);
      resultDiv.innerHTML = "Done! 🎉";
    }
  }, 1000); // 1 second gap
}
</script>

</body>
</html>
